name: kilotap
description: "KiloTap - Tap the App. Trade the Scrap. A two-sided recyclable scrap marketplace."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Maps
  google_maps_flutter: ^2.10.0
  google_maps_flutter_web: ^0.5.10

  # Local caching (NFR 2.2.3.2.3)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Fonts
  google_fonts: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

