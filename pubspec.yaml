name: kilotap
description: "KiloTap - Tap the App. Trade the Scrap. A two-sided recyclable scrap marketplace."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Authentication
  google_sign_in: ^6.2.1

  # UI & Utilities
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  google_maps_flutter: ^2.10.0
  google_maps_flutter_web: ^0.5.10

  # Fonts
  google_fonts: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

